<!DOCTYPE html>

<html lang="pl">
<head>
    <title>Shitpost Corner Majki</title>

    <link href="https://fonts.googleapis.com/css2?family=Coral+Pixels&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Micro+5&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

    <style>
        .character-container{
            width:100%;
            margin:0 auto;
            display:flex;
            justify-content:center;
            align-items:center;
            display:flex;
            justify-content:center;
            width:min(95vw, 900px);
            height:auto;

        }

        .character-container img{
            width:min(90vw, 700px);
            height:auto;
            display:block;
        }
        @media screen and (max-width: 768px){


            .header-inner{
                padding:10px;
            }

            .header-logo img{
                width:70vw;
                max-width:250px;
            }

            .powitanie{

                flex-direction:column;

                text-align:center;

                gap:1rem;

                padding:1rem;
            }

            .powitanie img{

                width:80vw;
                max-width:250px;

                height:auto;
            }


            .xp-post{

                width:95%;

                min-width:auto;

                margin:1rem auto;
            }

            .xp-post-title{

                font-size:1.2rem;

                padding:0.8rem;
            }

            .xp-post-title-edit{

                font-size:1.2rem;

                padding:1rem;
            }

            /* NEWSLETTER */

            .newsletter{

                flex-direction:column;

                align-items:stretch;

                gap:1rem;
            }

            .fields{

                width:100%;
            }

            .formbox{

                width:100%;

                max-width:none;
            }

            .submit{

                width:100%;

                margin:0;
            }

            .btnnews{

                width:100%;
            }

            /* MINI GRY */

            .games-container{

                flex-direction:column;

                align-items:center;
            }

            .xp-window{

                width:95%;

                max-width:350px;
            }

            /* MAPKA POSTACI */

            .character-container{

                width:100%;

                overflow-x:auto;
            }

            .character-container img{

                width:100%;

                max-width:500px;

                height:auto;
            }

            #dialog{

                font-size:14px;

                max-width:65%;
            }

            .xp-buttons{

                transform:scale(.9);
            }

        }

        @media screen and (max-width: 480px){

            .xp-post-title,
            .xp-post-title-edit{

                font-size:1rem;
            }

            .xp-post-bar{

                font-size:0.7rem;
            }

            .xp-btn{

                width:16px;
                height:16px;

                font-size:8px;
            }

            #dialog{
                font-size:12px;
            }

        }
    
        body{
            text-align:center;
            margin:0;
        }

        .xp-post{
            margin-left:auto;
            margin-right:auto;
        }

        .xp-post-title{
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        #dialogBox{
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            width:100%;
        }

        #dialog{
            margin:0 auto;
            max-width:700px;
        }

    
.xp-post{
    width:75% !important;
    max-width:1200px;
    margin:1.5rem auto !important;
}

@media screen and (max-width: 768px){
    .xp-post{
        width:92% !important;
    }
}

</style>

    <script src="https://cdn.jsdelivr.net/npm/image-map-resizer@1.0.10/js/imageMapResizer.min.js"></script>

    <script>
        fetch("../../fetches/headerclean.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("headeralt").innerHTML = data;
        });

        fetch("../../fetches/footer.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("footer").innerHTML = data;
        });

    window.addEventListener('load', () => {
        if (typeof imageMapResize === 'function') {
            imageMapResize();
        }
    });

    const discovered = new Set();

    function showDialog(title, text, id){

        document.getElementById("speaker").textContent = title;
        document.getElementById("dialog").textContent = text;

        if(!discovered.has(id)){

            discovered.add(id);

            document.getElementById("counter").textContent = discovered.size;

            if(discovered.size === 8){

                document.getElementById("speaker").textContent = "🎉 Gratulacje!";

                document.getElementById("dialog").textContent =
                "Udało Ci się odkryć wszystkie informacje o Majce!";
            }
        }
    }



    </script>

</head>
