<script>

        fetch("../../../fetches/headerclean.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("headeralt").innerHTML = data;
        });

        fetch("../../../fetches/footer.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("footer").innerHTML = data;
        });

const answers = [

    "Tak.",
    "Nie.",
    "Raczej tak.",
    "SZEŚĆ SIEDEM!!!!!11!!!1",
    "Zdecydowanie tak.",
    "Daj na chorom curke",
    "Nie mam pojęcia.",
    "twój ex to czerwona flaga",
    "*Britney spears Toxic Strings*",
    "Gwiazdy mówią: tak.",
    "Przegraj całe swoje pięniądze, dom i rodzine",
    "spal babcie na stosie",
    "Lepiej tego nie rób.",
    "Pocałuj mężczyzne.",
    "sprzedaj pseudopsychologiczny kurs za 10 tysięcy marek niemieckich i ucieknij do zakonu mnichów szaolin",
    "kup sobie smaczną kawusie",
    "rabini są podzieleni",


];

let thinking = false;

function randomAnswer(){

    if(thinking) return;

    thinking = true;

    const dialog =
        document.getElementById("dialog");

    dialog.textContent =
        " Myślę...";

    setTimeout(() => {

        const randomIndex =
            Math.floor(Math.random() * answers.length);

        dialog.textContent =
            answers[randomIndex];

        thinking = false;

    }, 1500);

}

window.addEventListener('load',()=>{
    if(typeof imageMapResize==='function'){imageMapResize();}
});
</script>
